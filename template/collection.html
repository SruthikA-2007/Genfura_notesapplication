<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - User Collections</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #020617;
            --bg-white: #0f172a;
            --border-color: rgba(99,102,241,0.15);
            --border-active: #4f46e5;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --text-light: #64748b;
            --primary: #6366f1;
            --primary-soft: rgba(99,102,241,0.1);
            --accent: #818cf8;
            --danger: #ef4444;
            --danger-soft: rgba(239, 68, 68, 0.12);
            --edit-color: #3b82f6;
            --edit-soft: rgba(59, 130, 246, 0.12);
            --folder-orange: #f59e0b;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.5);
            --font-body: 'Inter', sans-serif;
            --font-heading: 'Outfit', sans-serif;
            --radius: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
        }

        /* ===== NAV ===== */
        .col-nav {
            background: #0d1117;
            border-bottom: 1px solid var(--border-color);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .col-nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .col-nav-logo {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .col-nav-logo:hover { transform: scale(1.05); }

        .col-nav-title {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--text-main);
        }

        .col-nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .col-nav-btn {
            padding: 9px 24px;
            border-radius: 10px;
            font-family: var(--font-body);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1.5px solid var(--primary);
            background: var(--bg-white);
            color: var(--primary);
        }

        .col-nav-btn:hover {
            background: var(--primary);
            color: white;
        }

        .col-nav-btn.active {
            background: var(--primary);
            color: white;
        }

        /* ===== PAGE WRAPPER ===== */
        .col-page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* ===== VIEW SWITCHING ===== */
        #view-folders { display: block; }
        #view-notes   { display: none; }

        /* ===== PAGE HEADER ===== */
        .col-page-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .col-page-title span { color: var(--primary); }

        .col-page-sub {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        /* ===== SEARCH ===== */
        .col-search-wrap {
            position: relative;
            margin-bottom: 32px;
        }

        .col-search-wrap i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .col-search-wrap input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .col-search-wrap input::placeholder {
            color: var(--text-light);
        }

        .col-search-wrap input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }

        /* ===== FOLDER GRID ===== */
        .col-folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .col-folder-card {
            background: var(--bg-white);
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius);
            padding: 30px 18px 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .col-folder-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .col-folder-icon {
            font-size: 3rem;
            color: var(--folder-orange);
            line-height: 1;
        }

        .col-folder-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
            line-height: 1.3;
        }

        .col-folder-count {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--primary);
        }

        /* ===== VIEW B: USER NOTES DRILL-DOWN ===== */
        .col-back-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .col-back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
            padding: 0;
        }

        .col-back-btn:hover { color: var(--primary); }

        .col-breadcrumb-sep { color: var(--text-light); }

        .col-breadcrumb-current {
            color: var(--primary);
            font-weight: 700;
        }

        /* Notes grid inside user view */
        .col-notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }

        .col-note-card {
            background: var(--bg-white);
            border: 1.5px solid var(--border-color);
            border-left: 4px solid var(--primary);
            border-radius: var(--radius);
            padding: 20px 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-sm);
        }

        .col-note-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .col-note-card-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
            line-height: 1.4;
        }

        .col-note-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .col-note-timestamp {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .col-note-actions {
            display: flex;
            gap: 8px;
        }

        .col-note-edit,
        .col-note-del {
            border: none;
            border-radius: 8px;
            padding: 6px 9px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .col-note-edit {
            background: var(--edit-soft);
            color: var(--edit-color);
        }

        .col-note-edit:hover {
            background: var(--edit-color);
            color: white;
        }

        .col-note-del {
            background: var(--danger-soft);
            color: var(--danger);
        }

        .col-note-del:hover {
            background: var(--danger);
            color: white;
        }

        /* ===== EMPTY / LOADING STATES ===== */
        .col-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 24px;
            color: var(--text-light);
        }

        .col-empty i {
            font-size: 2.5rem;
            color: var(--primary);
            opacity: 0.35;
            display: block;
            margin-bottom: 12px;
        }

        .col-empty h3 {
            font-family: var(--font-heading);
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .col-loading-wrap {
            text-align: center;
            padding: 60px;
            color: var(--text-light);
        }

        /* ===== CHAT FAB ===== */
        .chat-fab {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.4);
            transition: all 0.3s ease;
            z-index: 200;
        }

        .chat-fab:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 28px rgba(79, 70, 229, 0.5);
        }

        /* ===== EDIT MODAL ===== */
        .edit-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .edit-modal-overlay.active {
            display: flex;
        }

        .edit-modal {
            background: #0f172a;
            border-radius: 18px;
            padding: 28px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .edit-modal h3 {
            font-family: var(--font-heading);
            font-size: 1.15rem;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .edit-modal textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            font-family: var(--font-body);
            font-size: 0.93rem;
            color: var(--text-main);
            background: #020617;
            outline: none;
            resize: vertical;
            transition: border-color 0.2s;
        }

        .edit-modal textarea:focus {
            border-color: var(--primary);
        }

        .edit-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 18px;
        }

        .edit-modal-btn {
            padding: 10px 22px;
            border-radius: 10px;
            font-family: var(--font-body);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid var(--border-color);
            background: var(--bg-white);
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .edit-modal-btn:hover {
            background: var(--bg-main);
        }

        .edit-modal-btn.save {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .edit-modal-btn.save:hover {
            background: #4338ca;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .col-nav { padding: 0 16px; }
            .col-page { padding: 28px 16px; }
            .col-page-title { font-size: 1.5rem; }
            .col-folder-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
            .col-notes-grid { grid-template-columns: 1fr; }
            .col-nav-btn { padding: 7px 14px; font-size: 0.82rem; }
        }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav class="col-nav">
        <a href="{{ url_for('index') }}" class="col-nav-brand">
            <div class="col-nav-logo"><i class="fa-solid fa-note-sticky"></i></div>
        </a>
        <div class="col-nav-actions">
            <a href="{{ url_for('notes') }}" class="col-nav-btn active">Notes</a>
        </div>
    </nav>

    <!-- ======= VIEW A: FOLDER GRID ======= -->
    <div class="col-page" id="view-folders">
        <h1 class="col-page-title">Shared Community <span>Collections</span></h1>
        <p class="col-page-sub">Select a user collection folder to view their saved notes.</p>

        <div class="col-search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="folder-search" placeholder="Search collections...">
        </div>

        <div class="col-folder-grid" id="folder-grid">
            <div class="col-loading-wrap">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size:2rem;color:var(--primary);"></i>
            </div>
        </div>
    </div>

    <!-- ======= VIEW B: USER NOTES ======= -->
    <div class="col-page" id="view-notes">
        <div class="col-back-bar">
            <button class="col-back-btn" id="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back to Collections
            </button>
            <span class="col-breadcrumb-sep">&nbsp;</span>
            <span>Collections</span>
            <span class="col-breadcrumb-sep">/</span>
            <span class="col-breadcrumb-current" id="breadcrumb-name">User</span>
        </div>

        <div class="col-search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="notes-search" placeholder="Search notes in this collection...">
        </div>

        <div class="col-notes-grid" id="notes-grid-inner"></div>
    </div>

    <!-- Chat FAB -->
    <button class="chat-fab" title="Chat">
        <i class="fa-solid fa-comment"></i>
    </button>

    <!-- Edit Note Modal -->
    <div class="edit-modal-overlay" id="edit-modal-overlay">
        <div class="edit-modal">
            <h3><i class="fa-solid fa-pen-to-square" style="color:var(--primary);margin-right:8px;"></i>Edit Note</h3>
            <textarea id="edit-note-text" placeholder="Update your note..."></textarea>
            <div class="edit-modal-actions">
                <button class="edit-modal-btn" id="edit-cancel-btn">Cancel</button>
                <button class="edit-modal-btn save" id="edit-save-btn">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        let allUsers = [];
        let currentUser = null;
        let editingNoteId = null;

        /* ---- Helpers ---- */
        function fmtDateTime(iso) {
            return new Date(iso).toLocaleString('en-US', {
                month: 'numeric', day: 'numeric', year: '2-digit',
                hour: 'numeric', minute: '2-digit'
            });
        }

        function noteTitle(msg) {
            return msg.length > 60 ? msg.substring(0, 60) + '…' : msg;
        }

        /* ---- VIEW SWITCHING ---- */
        function showFolders() {
            document.getElementById('view-folders').style.display = 'block';
            document.getElementById('view-notes').style.display = 'none';
            currentUser = null;
        }

        function showNotes(user) {
            currentUser = user;
            document.getElementById('view-folders').style.display = 'none';
            document.getElementById('view-notes').style.display = 'block';
            document.getElementById('breadcrumb-name').textContent = user.name;
            document.getElementById('notes-search').value = '';
            renderUserNotes(user.notes);
        }

        /* ---- RENDER FOLDER GRID ---- */
        function renderFolders(users) {
            const grid = document.getElementById('folder-grid');
            if (!users.length) {
                grid.innerHTML = `
                    <div class="col-empty" style="grid-column:1/-1">
                        <i class="fa-solid fa-folder-open"></i>
                        <h3>No collections yet</h3>
                        <p>Notes will appear here once users start sharing.</p>
                    </div>`;
                return;
            }
            grid.innerHTML = users.map(u => `
                <div class="col-folder-card" onclick="showNotes(getUserById(${u.user_id}))">
                    <div class="col-folder-icon"><i class="fa-solid fa-folder"></i></div>
                    <div class="col-folder-name">${u.name}</div>
                    <div class="col-folder-count">${u.notes.length} note${u.notes.length !== 1 ? 's' : ''}</div>
                </div>
            `).join('');
        }

        /* ---- RENDER USER NOTES ---- */
        function renderUserNotes(notes) {
            const grid = document.getElementById('notes-grid-inner');
            if (!notes.length) {
                grid.innerHTML = `
                    <div class="col-empty">
                        <i class="fa-solid fa-note-medical"></i>
                        <h3>No notes</h3>
                        <p>This user has no notes yet.</p>
                    </div>`;
                return;
            }
            grid.innerHTML = notes.map(note => `
                <div class="col-note-card" id="note-card-${note.id}">
                    <div class="col-note-card-title">${noteTitle(note.message)}</div>
                    <div class="col-note-card-footer">
                        <div class="col-note-timestamp">
                            <i class="fa-regular fa-clock"></i>
                            ${fmtDateTime(note.created_at)}
                        </div>
                        <div class="col-note-actions">
                            <button class="col-note-edit" onclick="openEditModal(${note.id}, '${note.message.replace(/'/g, "\\'").replace(/\n/g, "\\n")}')" title="Edit">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                            <button class="col-note-del" onclick="deleteNote(${note.id})" title="Delete">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        /* ---- GET USER BY ID ---- */
        function getUserById(uid) {
            return allUsers.find(u => u.user_id === uid);
        }

        /* ---- DELETE NOTE ---- */
        async function deleteNote(id) {
            if (!confirm('Delete this note permanently?')) return;
            try {
                const res = await fetch(`/api/history/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    if (currentUser) {
                        currentUser.notes = currentUser.notes.filter(n => n.id !== id);
                        const user = allUsers.find(u => u.user_id === currentUser.user_id);
                        if (user) user.notes = currentUser.notes;
                    }
                    document.getElementById(`note-card-${id}`)?.remove();
                    if (currentUser && currentUser.notes.length === 0) {
                        renderUserNotes([]);
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        /* ---- EDIT NOTE ---- */
        function openEditModal(noteId, noteMsg) {
            editingNoteId = noteId;
            document.getElementById('edit-note-text').value = noteMsg;
            document.getElementById('edit-modal-overlay').classList.add('active');
        }

        function closeEditModal() {
            editingNoteId = null;
            document.getElementById('edit-modal-overlay').classList.remove('active');
        }

        async function saveEditedNote() {
            if (!editingNoteId) return;
            const newMessage = document.getElementById('edit-note-text').value.trim();
            if (!newMessage) return;

            try {
                const res = await fetch(`/api/history/${editingNoteId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: newMessage })
                });

                if (res.ok) {
                    // Update local state
                    if (currentUser) {
                        const note = currentUser.notes.find(n => n.id === editingNoteId);
                        if (note) note.message = newMessage;
                        renderUserNotes(currentUser.notes);
                    }
                    closeEditModal();
                }
            } catch (e) {
                console.error(e);
            }
        }

        document.getElementById('edit-cancel-btn').addEventListener('click', closeEditModal);
        document.getElementById('edit-save-btn').addEventListener('click', saveEditedNote);

        // Close modal on overlay click
        document.getElementById('edit-modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });

        /* ---- FOLDER SEARCH ---- */
        document.getElementById('folder-search').addEventListener('input', function () {
            const q = this.value.toLowerCase().trim();
            const filtered = allUsers.filter(u => u.name.toLowerCase().includes(q));
            renderFolders(filtered);
        });

        /* ---- NOTES SEARCH ---- */
        document.getElementById('notes-search').addEventListener('input', function () {
            if (!currentUser) return;
            const q = this.value.toLowerCase().trim();
            const filtered = currentUser.notes.filter(n => n.message.toLowerCase().includes(q));
            renderUserNotes(filtered);
        });

        /* ---- BACK BUTTON ---- */
        document.getElementById('back-btn').addEventListener('click', showFolders);

        /* ---- LOAD DATA ---- */
        async function loadCollection() {
            try {
                const res = await fetch('/api/notes_grouped');
                const data = await res.json();

                if (data.status === 'error') throw new Error(data.message);

                allUsers = data;
                renderFolders(allUsers);
            } catch (err) {
                document.getElementById('folder-grid').innerHTML = `
                    <div class="col-empty" style="grid-column:1/-1">
                        <i class="fa-solid fa-triangle-exclamation" style="color:#ef4444;"></i>
                        <h3>Failed to load</h3>
                        <p>Please refresh the page and try again.</p>
                    </div>`;
                console.error(err);
            }
        }

        loadCollection();
    </script>
</body>
</html>
