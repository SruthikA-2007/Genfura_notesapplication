<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - User Collections</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body class="dashboard-body dark">

    <!-- Nav -->
    <nav class="col-nav">
        <a href="{{ url_for('index') }}" class="col-nav-brand">
            <div class="col-nav-logo"><i class="fa-solid fa-note-sticky"></i></div>
        </a>
        <div class="col-nav-actions">
            <a href="{{ url_for('notes') }}" class="col-nav-btn active">Notes</a>
        </div>
    </nav>

    <!-- ======= VIEW A: FOLDER GRID ======= -->
    <div class="col-page" id="view-folders">
        <h1 class="col-page-title">Shared Community <span>Collections</span></h1>
        <p class="col-page-sub">Select a user collection folder to view their saved notes.</p>

        <div class="col-search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="folder-search" placeholder="Search collections...">
        </div>

        <div class="col-folder-grid" id="folder-grid">
            <div class="col-loading-wrap">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size:2rem;color:var(--primary);"></i>
            </div>
        </div>
    </div>

    <!-- ======= VIEW B: USER NOTES ======= -->
    <div class="col-page" id="view-notes">
        <div class="col-back-bar">
            <button class="col-back-btn" id="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back to Collections
            </button>
            <span class="col-breadcrumb-sep">&nbsp;</span>
            <span>Collections</span>
            <span class="col-breadcrumb-sep">/</span>
            <span class="col-breadcrumb-current" id="breadcrumb-name">User</span>
        </div>

        <div class="col-search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="notes-search" placeholder="Search notes in this collection...">
        </div>

        <div class="col-notes-grid" id="notes-grid-inner"></div>
    </div>

    <!-- Chatbot Widget -->
    <div class="chatbot-container">
        <!-- Chat Window -->
        <div class="chat-window hidden">
            <div class="chat-header">
                NoteSync Support
            </div>
            <!-- Messages Area -->
            <div class="chat-body" id="chat-messages">
            </div>
            <!-- Input Area -->
            <div class="chat-footer">
                <form id="chat-form">
                    <input type="text" id="chat-input" placeholder="Ask a question..." required>
                    <button type="submit" class="chat-send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
        <!-- Toggle Button -->
        <button class="chatbot-toggle-btn">
            <i class="fa-solid fa-comments"></i>
        </button>
    </div>

    <!-- Edit Note Modal -->
    <div class="edit-modal-overlay" id="edit-modal-overlay">
        <div class="edit-modal">
            <h3><i class="fa-solid fa-pen-to-square" style="color:var(--primary);margin-right:8px;"></i>Edit Note</h3>
            <textarea id="edit-note-text" placeholder="Update your note..."></textarea>
            <div class="edit-modal-actions">
                <button class="edit-modal-btn" id="edit-cancel-btn">Cancel</button>
                <button class="edit-modal-btn save" id="edit-save-btn">Save Changes</button>
            </div>
        </div>
    </div>


    <!-- External Scripts -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
