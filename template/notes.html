<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteSync - All Notes</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="dashboard-body dark">

    <!-- Top Dashboard Nav -->
    <nav class="dashboard-nav dark">
        <div class="container dash-nav-container">
            <div class="dash-identity">
                <a href="{{ url_for('index') }}" class="dash-logo" title="Back to Home">
                    <i class="fa-solid fa-note-sticky"></i>
                </a>
                <div class="dash-welcome">
                    <h1>All Notes</h1>
                    <p>Browse and manage shared community insights</p>
                </div>
            </div>
            
            <div class="dash-actions">
                <div class="search-box-top">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="top-search" placeholder="Quick search...">
                </div>
                <div class="dash-user-controls">
                    <a href="{{ url_for('collection') }}" class="nav-text-link" style="color: #ffffff; text-decoration: none; font-weight: 600; margin-right: 15px; font-size: 0.9rem; transition: color 0.2s;">
                        Collections
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="dashboard-main container">
        
        <!-- Stats Section (Simplified) -->
        <section class="stats-grid">
            <div class="stat-card dark purple">
                <div class="stat-icon"><i class="fa-solid fa-note-sticky"></i></div>
                <div class="stat-info">
                    <span class="stat-label">Total Notes</span>
                    <h3 class="stat-value" id="total-notes-count">0</h3>
                </div>
            </div>
            <div class="stat-card dark blue">
                <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
                <div class="stat-info">
                    <span class="stat-label">Community Users</span>
                    <h3 class="stat-value" id="total-users-count">0</h3>
                </div>
            </div>
            <div class="stat-card dark green">
                <div class="stat-icon"><i class="fa-solid fa-calendar-check"></i></div>
                <div class="stat-info">
                    <span class="stat-label">Shared Today</span>
                    <h3 class="stat-value" id="today-notes-count">0</h3>
                </div>
            </div>
        </section>

        <!-- Filter Bar (Essential Only) -->
        <section class="filter-bar dark">
            <div class="filter-group main-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="grid-search" placeholder="Search notes by content...">
            </div>
            
            

            <div class="view-controls dark">
                <button class="view-btn active" id="grid-view-btn" title="Grid View">
                    <i class="fa-solid fa-table-cells-large"></i>
                </button>
            </div>
        </section>

        <!-- Notes Grid -->
        <div id="notes-grid" class="notes-grid">
            <div class="loading-placeholder">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
                <p>Loading community workspace...</p>
            </div>
        </div>



    </main>

    <!-- Chatbot Widget -->
    <div class="chatbot-container">
        <!-- Chat Window -->
        <div class="chat-window hidden">
            <div class="chat-header">
                NoteSync Support
            </div>
            <!-- Messages Area -->
            <div class="chat-body" id="chat-messages">
            </div>
            <!-- Input Area -->
            <div class="chat-footer">
                <form id="chat-form">
                    <input type="text" id="chat-input" placeholder="Ask a question..." required>
                    <button type="submit" class="chat-send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
        <!-- Toggle Button -->
        <button class="chatbot-toggle-btn">
            <i class="fa-solid fa-comments"></i>
        </button>
    </div>

    <!-- Custom Script -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
